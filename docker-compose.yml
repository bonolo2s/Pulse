name: pulse

services:
  postgres:
    image: postgres:15
    container_name: pulse-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pulse
    ports:
      - "5432:5432"
    volumes:
      - pulse-postgres-data:/var/lib/postgresql/data

  # redis:
  #   image: redis:7
  #   container_name: pulse-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - pulse-redis-data:/data

  floci:
    image: floci/floci:latest
    container_name: pulse-floci
    ports:
      - "4566:4566"
    environment:
      - AWS_DEFAULT_REGION=eu-west-1
      - FLOCI_ENFORCE_IAM=true
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - pulse-floci-data:/var/lib/floci

volumes:
  pulse-postgres-data:
  pulse-redis-data:
  pulse-floci-data: