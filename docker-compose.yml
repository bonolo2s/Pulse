name: pulse

services:
  postgres:
    image: postgres:15
    container_name: pulse-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pulse
    ports:
      - "5432:5432"
    volumes:
      - pulse-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: pulse-redis
    ports:
      - "6379:6379"
    volumes:
      - pulse-redis-data:/data

volumes:
  pulse-postgres-data:
  pulse-redis-data: