name: pulse

services:
  postgres:
    image: postgres:15
    container_name: pulse-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pulse
    ports:
      - "5432:5432"
    volumes:
      - pulse-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: pulse-redis
    ports:
      - "6379:6379"
    volumes:
      - pulse-redis-data:/data

  localstack:
    image: localstack/localstack
    container_name: pulse-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sns,ses,events,lambda
      - DEFAULT_REGION=eu-west-1
      - LAMBDA_EXECUTOR=docker
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - pulse-localstack-data:/var/lib/localstack

volumes:
  pulse-postgres-data:
  pulse-redis-data:
  pulse-localstack-data: